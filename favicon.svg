  <!-- Black pupils -->
  <ellipse cx="13" cy="15.5" rx="3" ry="3.5" fill="#111"/>
  <ellipse cx="21" cy="15.5" rx="3" ry="3.5" fill="#111"/>
  <!-- Eye shine -->
  <circle cx="14.5" cy="14" r="1" fill="white"/>
  <circle cx="22.5" cy="14" r="1" fill="white"/>
  <!-- Nose -->
