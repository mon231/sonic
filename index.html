<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Ultimate Sonic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }

        #controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 148px;
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: rgba(0,0,0,0.45);
            z-index: 10;
        }

        #dpad {
            display: grid;
            grid-template-columns: repeat(3, 54px);
            grid-template-rows: repeat(3, 54px);
            gap: 3px;
        }

        .dpad-btn {
            background: rgba(255,255,255,0.13);
            border: 1.5px solid rgba(255,255,255,0.28);
            border-radius: 10px;
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.05s;
        }
        .dpad-btn:active { background: rgba(255,255,255,0.35); }

        #btn-up    { grid-column: 2; grid-row: 1; }
        #btn-left  { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down  { grid-column: 2; grid-row: 3; }

        #btn-jump {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: rgba(210, 50, 50, 0.45);
            border: 2px solid rgba(255,110,110,0.5);
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.05s;
        }
        #btn-jump:active { background: rgba(210, 50, 50, 0.85); }
    </style>
</head>
<body>
    <div id="controls">
        <div id="dpad">
            <button class="dpad-btn" id="btn-up"    data-key="38">&#9650;</button>
            <button class="dpad-btn" id="btn-left"  data-key="37">&#9664;</button>
            <button class="dpad-btn" id="btn-right" data-key="39">&#9654;</button>
            <button class="dpad-btn" id="btn-down"  data-key="40">&#9660;</button>
        </div>
        <button id="btn-jump" data-key="32">JUMP</button>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        var KEY_INFO = {
            32: { key: " ",          code: "Space"       },
            37: { key: "ArrowLeft",  code: "ArrowLeft"   },
            38: { key: "ArrowUp",    code: "ArrowUp"     },
            39: { key: "ArrowRight", code: "ArrowRight"  },
            40: { key: "ArrowDown",  code: "ArrowDown"   }
        };

        function fireKey(keyCode, type) {
            var info = KEY_INFO[keyCode];
            window.dispatchEvent(new KeyboardEvent(type, {
                keyCode: keyCode, which: keyCode,
                key: info.key, code: info.code,
                bubbles: true, cancelable: true
            }));
        }

        window.addEventListener("load", function () {
            var ruffle = window.RufflePlayer.newest();
            var player = ruffle.createPlayer();

            var isMobile = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
            var controls = document.getElementById("controls");

            if (isMobile) {
                player.style.cssText = "width:100vw;height:calc(100vh - 148px);display:block;";
                controls.style.display = "flex";

                document.querySelectorAll(".dpad-btn, #btn-jump").forEach(function (btn) {
                    var key = parseInt(btn.dataset.key, 10);
                    btn.addEventListener("touchstart",  function (e) { e.preventDefault(); fireKey(key, "keydown"); }, { passive: false });
                    btn.addEventListener("touchend",    function (e) { e.preventDefault(); fireKey(key, "keyup");   }, { passive: false });
                    btn.addEventListener("touchcancel", function (e) { e.preventDefault(); fireKey(key, "keyup");   }, { passive: false });
                });
            } else {
                player.style.cssText = "width:100vw;height:100vh;display:block;";
            }

            document.body.insertBefore(player, controls);

            player.load({
                url: "./sonic_fly.swf",
                autoplay: "on",
                scale: "showAll",
                quality: "high",
                salign: "c"
            });
        });
    </script>
</body>
</html>
