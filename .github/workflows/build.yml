name: Build and Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "ultimate_sonic.swf"
      - "decompiled/scripts/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "decompiled/scripts/**"
      - "ultimate_sonic.swf"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache FFDec
        id: cache-ffdec
        uses: actions/cache@v4
        with:
          path: ffdec/
          key: ffdec-21.0.1

      - name: Download FFDec
        if: steps.cache-ffdec.outputs.cache-hit != 'true'
        run: |
          curl -L \
            https://github.com/jindrapetrik/jpexs-decompiler/releases/download/version21.0.1/ffdec_21.0.1.zip \
            -o ffdec.zip
          unzip ffdec.zip -d ffdec/

      - name: Recompile SWF
        run: |
          FFDEC=$(find ffdec -name "ffdec.jar" | head -1)
          java -Djava.awt.headless=true -jar "$FFDEC" \
            -importScript ultimate_sonic.swf sonic_fly.swf \
            decompiled/scripts

      - name: Commit rebuilt SWF to main
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f sonic_fly.swf
          git diff --cached --exit-code || (git commit -m "ci: rebuild sonic_fly.swf [skip ci]" && git push)

      - name: Prepare Pages bundle
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp index.html _site/
          cp sonic_fly.swf _site/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
